<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Secure Trading Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 font-sans leading-normal tracking-normal">
    <div class="container mx-auto p-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold">Analytics</h1>
            <nav>
                <a href="#" id="back-to-dashboard" class="text-blue-400 hover:underline">Back to Dashboard</a>
            </nav>
        </header>

        <main class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
            <h2 class="text-xl font-semibold mb-4">VWAP Chart</h2>
            <div class="relative h-96">
                <canvas id="vwap-chart"></canvas>
            </div>
            <p class="mt-4 text-gray-400">This chart displays the Volume Weighted Average Price (VWAP) of all trades.</p>
        </main>
    </div>
</body>
</html>
