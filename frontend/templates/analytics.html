<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Secure Trading Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="container mx-auto p-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold">Analytics</h1>
            <nav>
                <a href="/" class="text-blue-500 hover:underline">Home</a>
            </nav>
        </header>

        <main class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4">VWAP Chart</h2>
            <img src="/analytics/vwap.png" alt="VWAP Chart" class="w-full h-auto max-w-2xl mx-auto border border-gray-300 rounded-md">
            <p class="mt-4 text-gray-600">This chart displays the Volume Weighted Average Price (VWAP) of all trades.</p>
        </main>
    </div>
</body>
</html>
