<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red/Blue Team Simulation - Secure Trading Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="container mx-auto p-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold">Red/Blue Team Simulation</h1>
            <nav>
                <a href="/" class="text-blue-500 hover:underline">Home</a>
            </nav>
        </header>

        <main class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4">Simulate Attacks</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button id="sqlmap-sim-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">
                    Simulate SQL Injection
                </button>
                <button id="bruteforce-sim-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">
                    Simulate Brute Force
                </button>
                <button id="replay-sim-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">
                    Simulate Replay Attack
                </button>
                <button id="mitm-sim-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">
                    Simulate MITM Attack
                </button>
            </div>

            <h2 class="text-xl font-semibold mt-8 mb-4">Simulation Output</h2>
            <pre id="simulation-output" class="bg-gray-800 text-green-400 p-4 rounded-md overflow-auto h-64"></pre>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const outputDiv = document.getElementById('simulation-output');
            const API_BASE_URL = 'http://localhost:8000';

            async function runSimulation(endpoint) {
                outputDiv.textContent = `Running simulation for ${endpoint}...
`;
                try {
                    const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('access_token')}` // Assuming token is available
                        }
                    });
                    const data = await response.json();
                    outputDiv.textContent += JSON.stringify(data, null, 2) + '\n';
                } catch (error) {
                    outputDiv.textContent += `Error: ${error.message}\n`;
                    console.error('Simulation error:', error);
                }
            }

            document.getElementById('sqlmap-sim-btn').addEventListener('click', () => runSimulation('/sim/sqlmap'));
            document.getElementById('bruteforce-sim-btn').addEventListener('click', () => runSimulation('/sim/bruteforce'));
            document.getElementById('replay-sim-btn').addEventListener('click', () => runSimulation('/sim/replay'));
            document.getElementById('mitm-sim-btn').addEventListener('click', () => runSimulation('/sim/mitm'));
        });
    </script>
</body>
</html>
