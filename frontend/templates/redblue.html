<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red/Blue Team Simulation - Secure Trading Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 font-sans leading-normal tracking-normal">
    <div class="container mx-auto p-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold">Red/Blue Team Simulation</h1>
            <nav>
                <a href="#" id="back-to-dashboard" class="text-blue-400 hover:underline">Back to Dashboard</a>
            </nav>
        </header>

        <main class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
            <h2 class="text-xl font-semibold mb-4">Simulate Attacks</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button id="sqlmap-sim-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">Simulate SQL Injection</button>
                <button id="bruteforce-sim-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">Simulate Brute Force</button>
                <button id="replay-sim-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">Simulate Replay Attack</button>
                <button id="mitm-sim-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">Simulate MITM Attack</button>
            </div>

            <h2 class="text-xl font-semibold mt-8 mb-4">Simulation Output</h2>
            <pre id="simulation-output" class="bg-gray-900 text-green-400 p-4 rounded-md overflow-auto h-64 border border-gray-700"></pre>
        </main>
    </div>
</body>
</html>
