<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Trading Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="/static/cryptography.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans leading-normal tracking-normal">

    <div id="logged-out-view" class="min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md">
            <div class="bg-gray-800 shadow-lg rounded-lg p-8 border border-gray-700">
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-100">Secure Trading Exchange</h2>
                <p class="mt-2 text-center text-sm text-gray-400">Sign in to your account or create a new one</p>
                <div id="message-area-logged-out" class="mt-4 text-center text-sm font-medium text-gray-300"></div>
                <div class="flex justify-center space-x-4 my-6">
                    <button id="show-login" class="px-4 py-2 rounded-md text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">Login</button>
                    <button id="show-register" class="px-4 py-2 rounded-md text-sm font-medium text-gray-300 bg-gray-700 hover:bg-gray-600">Register</button>
                </div>
                <form id="login-form" class="space-y-6">
                    <div>
                        <label for="login-username" class="sr-only">Username</label>
                        <input id="login-username" name="username" type="text" autocomplete="username" required class="appearance-none relative block w-full px-3 py-2 border border-gray-600 placeholder-gray-500 text-gray-100 bg-gray-700 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Username">
                    </div>
                    <div>
                        <label for="login-password" class="sr-only">Password</label>
                        <input id="login-password" name="password" type="password" autocomplete="current-password" required class="appearance-none relative block w-full px-3 py-2 border border-gray-600 placeholder-gray-500 text-gray-100 bg-gray-700 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Password">
                    </div>
                    <div>
                        <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">Login</button>
                    </div>
                </form>
                <form id="register-form" class="space-y-6 hidden">
                    <div>
                        <label for="register-username" class="sr-only">Username</label>
                        <input id="register-username" name="username" type="text" autocomplete="username" required class="appearance-none relative block w-full px-3 py-2 border border-gray-600 placeholder-gray-500 text-gray-100 bg-gray-700 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Username">
                    </div>
                    <div>
                        <label for="register-password" class="sr-only">Password</label>
                        <input id="register-password" name="password" type="password" autocomplete="new-password" required class="appearance-none relative block w-full px-3 py-2 border border-gray-600 placeholder-gray-500 text-gray-100 bg-gray-700 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Password">
                    </div>
                    <div>
                        <label for="register-confirm-password" class="sr-only">Confirm Password</label>
                        <input id="register-confirm-password" name="confirm-password" type="password" autocomplete="new-password" required class="appearance-none relative block w-full px-3 py-2 border border-gray-600 placeholder-gray-500 text-gray-100 bg-gray-700 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Confirm Password">
                    </div>
                    <div>
                        <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="loggedIn-view" class="hidden flex h-screen bg-gray-900">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-gray-100 flex flex-col border-r border-gray-700">
            <div class="text-2xl font-bold p-5 border-b border-gray-700">STE</div>
            <nav class="flex-1 px-4 py-4 space-y-2">
                <a href="#" id="home-link" class="flex items-center px-4 py-2 text-gray-300 hover:bg-gray-700 hover:text-white rounded-md">Home</a>
                <a href="/analytics" id="analytics-link" class="flex items-center px-4 py-2 text-gray-300 hover:bg-gray-700 hover:text-white rounded-md">Analytics</a>
                <a href="/logs" id="logs-link" class="flex items-center px-4 py-2 text-gray-300 hover:bg-gray-700 hover:text-white rounded-md">Logs</a>
                <a href="/sim" id="sim-link" class="flex items-center px-4 py-2 text-gray-300 hover:bg-gray-700 hover:text-white rounded-md">Simulation</a>
            </nav>
            <div class="p-5 border-t border-gray-700">
                <p>Welcome, <span id="current-username" class="font-semibold"></span></p>
                <p class="text-sm text-gray-400">Role: <span id="current-user-role"></span></p>
                <p class="text-sm text-gray-400">Balance: $<span id="current-user-balance"></span></p>
                <button id="logout-button" class="w-full mt-4 px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-900 p-10">
                <div id="message-area-logged-in" class="mb-4 text-center text-sm font-medium text-gray-300"></div>
                <div id="main-dashboard">
                    <!-- Dashboard content -->
                </div>
                <div id="admin-content" class="hidden">
                    <!-- Admin content -->
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.0/jsencrypt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
